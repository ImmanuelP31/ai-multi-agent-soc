services:

  # ─────────────────────────────────────────
  # INFRASTRUCTURE
  # ─────────────────────────────────────────

  postgres:
    image: postgres:15
    container_name: ai_soc_postgres
    restart: always
    environment:
      POSTGRES_USER: socuser
      POSTGRES_PASSWORD: socpass
      POSTGRES_DB: socdb
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U socuser -d socdb"]
      interval: 5s
      timeout: 5s
      retries: 10

  redis:
    image: redis:7
    container_name: ai_soc_redis
    restart: always
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5

  zookeeper:
    image: bitnamilegacy/zookeeper:3.9.3-debian-12-r22
    container_name: ai_soc_zookeeper
    environment:
      ALLOW_ANONYMOUS_LOGIN: "yes"
      # Enable ruok so the healthcheck below works.
      # ZooKeeper 3.5+ disables it by default; this re-enables it.
      ZOO_4LW_COMMANDS_WHITELIST: "mntr,srvr,ruok"
    ports:
      - "2181:2181"
    healthcheck:
      test: ["CMD-SHELL", "echo ruok | nc localhost 2181 | grep imok"]
      interval: 10s
      timeout: 5s
      retries: 15

  kafka:
    image: bitnamilegacy/kafka:3.7.1-debian-12-r9
    container_name: ai_soc_kafka
    hostname: kafka
    ports:
      - "9094:9094"
    environment:
      KAFKA_BROKER_ID: "1"
      KAFKA_CFG_ZOOKEEPER_CONNECT: zookeeper:2181
      ALLOW_PLAINTEXT_LISTENER: "yes"
      KAFKA_CFG_LISTENERS: INTERNAL://:9092,EXTERNAL://:9094
      KAFKA_CFG_ADVERTISED_LISTENERS: INTERNAL://kafka:9092,EXTERNAL://localhost:9094
      KAFKA_CFG_LISTENER_SECURITY_PROTOCOL_MAP: INTERNAL:PLAINTEXT,EXTERNAL:PLAINTEXT
      KAFKA_CFG_INTER_BROKER_LISTENER_NAME: INTERNAL
      # ── Pre-create all topics the agent pipeline needs ──────────────────────
      # Format: topic:partitions:replication
      KAFKA_CFG_AUTO_CREATE_TOPICS_ENABLE: "true"
    depends_on:
      zookeeper:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "kafka-topics.sh --bootstrap-server localhost:9092 --list"]
      interval: 15s
      timeout: 10s
      retries: 10

  # ── Create topics explicitly so agents don't race at startup ────────────────
  kafka-init:
    image: bitnamilegacy/kafka:3.7.1-debian-12-r9
    container_name: ai_soc_kafka_init
    depends_on:
      kafka:
        condition: service_healthy
    entrypoint: ["/bin/bash", "-c"]
    command: |
      "
      echo 'Creating Kafka topics...'
      kafka-topics.sh --bootstrap-server kafka:9092 --create --if-not-exists --topic soc_logs               --partitions 1 --replication-factor 1
      kafka-topics.sh --bootstrap-server kafka:9092 --create --if-not-exists --topic soc_alerts             --partitions 1 --replication-factor 1
      kafka-topics.sh --bootstrap-server kafka:9092 --create --if-not-exists --topic investigated_alerts    --partitions 1 --replication-factor 1
      kafka-topics.sh --bootstrap-server kafka:9092 --create --if-not-exists --topic threat_enriched_alerts --partitions 1 --replication-factor 1
      kafka-topics.sh --bootstrap-server kafka:9092 --create --if-not-exists --topic remediation_actions    --partitions 1 --replication-factor 1
      echo 'All topics created.'
      "
    restart: "no"

  # ─────────────────────────────────────────
  # BACKEND API
  # ─────────────────────────────────────────

  backend:
    build: .
    container_name: ai_soc_backend
    ports:
      - "8000:8000"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      kafka:
        condition: service_healthy
    volumes:
      - .:/app
    environment:
      DATABASE_URL: postgresql://socuser:socpass@postgres:5432/socdb
      REDIS_HOST: redis
      KAFKA_BOOTSTRAP_SERVERS: kafka:9092
    restart: on-failure

  # ─────────────────────────────────────────
  # AGENT PIPELINE
  # All agents use kafka:9092 (internal listener)
  # Startup order: detection → investigation → threat_intel → remediation → reporting
  # ─────────────────────────────────────────

  detection-agent:
    build: .
    container_name: ai_soc_detection
    command: ["python", "agents/detection_agent.py"]
    depends_on:
      kafka-init:
        condition: service_completed_successfully
      postgres:
        condition: service_healthy
    volumes:
      - .:/app
    environment:
      DATABASE_URL: postgresql://socuser:socpass@postgres:5432/socdb
      KAFKA_BOOTSTRAP_SERVERS: kafka:9092
    restart: on-failure

  investigation-agent:
    build: .
    container_name: ai_soc_investigation
    command: ["python", "agents/investigation_agent.py"]
    depends_on:
      kafka-init:
        condition: service_completed_successfully
    volumes:
      - .:/app
    environment:
      KAFKA_BOOTSTRAP_SERVERS: kafka:9092
    restart: on-failure

  threat-intel-agent:
    build: .
    container_name: ai_soc_threat_intel
    command: ["python", "agents/threat_intel_agent.py"]
    depends_on:
      kafka-init:
        condition: service_completed_successfully
    volumes:
      - .:/app
    environment:
      KAFKA_BOOTSTRAP_SERVERS: kafka:9092
    restart: on-failure

  remediation-agent:
    build: .
    container_name: ai_soc_remediation
    command: ["python", "agents/remediation_agent.py"]
    depends_on:
      kafka-init:
        condition: service_completed_successfully
      postgres:
        condition: service_healthy
    volumes:
      - .:/app
    environment:
      DATABASE_URL: postgresql://socuser:socpass@postgres:5432/socdb
      KAFKA_BOOTSTRAP_SERVERS: kafka:9092
    restart: on-failure

  reporting-agent:
    build: .
    container_name: ai_soc_reporting
    command: ["python", "agents/reporting_agent.py"]
    depends_on:
      kafka-init:
        condition: service_completed_successfully
    volumes:
      - .:/app
    environment:
      KAFKA_BOOTSTRAP_SERVERS: kafka:9092
    restart: on-failure

volumes:
  postgres_data: